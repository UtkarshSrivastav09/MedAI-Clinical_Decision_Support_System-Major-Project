<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Accent Gradient Cyan to Purple -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" />
      <stop offset="100%" stop-color="#b388ff" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#b388ff" stop-opacity="0" />
    </linearGradient>
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Glowing MedAI Emblem (Transparent Background) -->
  <g filter="url(#glow)">
    <!-- Vertical bar of medical cross -->
    <rect x="236" y="90" width="40" height="332" rx="20" fill="url(#primary-grad)" />
    
    <!-- Heartbeat EKG Pulse running horizontally to form the horizontal cross bar -->
    <path d="M 70 256 
             L 175 256 
             L 210 160 
             L 236 352 
             L 256 110 
             L 276 352 
             L 302 160 
             L 337 256 
             L 442 256" 
          fill="none" 
          stroke="url(#primary-grad)" 
          stroke-width="40" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
  </g>

  <!-- Neural Network AI Nodes at key endpoints for the AI look -->
  <g filter="url(#glow)">
    <!-- Main Center Core Node -->
    <circle cx="256" cy="256" r="30" fill="#ffffff" stroke="url(#primary-grad)" stroke-width="8" />
    <circle cx="256" cy="256" r="14" fill="#00e5ff" />
    
    <!-- Peripheral Nodes -->
    <circle cx="256" cy="90" r="22" fill="#00e5ff" stroke="#ffffff" stroke-width="4" />
    <circle cx="256" cy="422" r="22" fill="#b388ff" stroke="#ffffff" stroke-width="4" />
    <circle cx="70" cy="256" r="22" fill="#b388ff" stroke="#ffffff" stroke-width="4" />
    <circle cx="442" cy="256" r="22" fill="#00e5ff" stroke="#ffffff" stroke-width="4" />
    
    <!-- Pulse peak nodes -->
    <circle cx="210" cy="160" r="10" fill="#ffffff" />
    <circle cx="236" cy="352" r="10" fill="#ffffff" />
    <circle cx="276" cy="352" r="10" fill="#ffffff" />
    <circle cx="302" cy="160" r="10" fill="#ffffff" />
  </g>
</svg>